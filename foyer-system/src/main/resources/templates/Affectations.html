<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Affectations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
    <div class="container-fluid">

        <a class="navbar-brand" href="/dashboard">Foyer System</a>

        <ul class="navbar-nav me-auto">

            <li class="nav-item">
                <a class="nav-link" href="/students">Students</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/rooms">Rooms</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/affectations">Affectations</a>
            </li>

        </ul>

    </div>
</nav>

<h2>Affectations</h2>

<!-- FORM -->
<form th:action="@{/affectations/save}" th:object="${affectation}" method="post"
      class="card p-3 mb-4">

    <input type="hidden" th:field="*{id}"/>

    <!-- STUDENT -->
    <select class="form-select mb-2" th:field="*{studentId}" required>
        <option value="">Select Student</option>
        <option th:each="s : ${students}"
                th:value="${s.id}"
                th:text="${s.firstName + ' ' + s.lastName}">
        </option>
    </select>

    <!-- ROOM -->
    <select class="form-select mb-2" th:field="*{roomId}" required>
        <option value="">Select Room</option>
        <option th:each="r : ${rooms}"
                th:value="${r.id}"
                th:text="${r.roomNumber}">
        </option>
    </select>

    <button class="btn btn-primary">Save</button>
</form>

<!-- TABLE -->
<table class="table table-bordered table-hover">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Student</th>
        <th>Room</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="a : ${affectations}">

        <td th:text="${a.id}"></td>

        <td th:text="${a.studentName}"></td>

        <td th:text="${a.roomNumber}"></td>

        <!-- STATUS BADGE -->
        <td>
            <span th:switch="${a.status}">
                <span th:case="'PENDING'" class="badge bg-warning">PENDING</span>
                <span th:case="'APPROVED'" class="badge bg-success">APPROVED</span>
                <span th:case="'REJECTED'" class="badge bg-danger">REJECTED</span>
            </span>
        </td>

        <!-- ACTIONS -->
        <td>

            <a th:href="@{/affectations/approve/{id}(id=${a.id})}"
               class="btn btn-success btn-sm">
                Approve
            </a>

            <a th:href="@{/affectations/reject/{id}(id=${a.id})}"
               class="btn btn-danger btn-sm">
                Reject
            </a>

            <a th:href="@{/affectations/pending/{id}(id=${a.id})}"
               class="btn btn-warning btn-sm">
                Pending
            </a>

            <a th:href="@{/affectations/delete/{id}(id=${a.id})}"
               class="btn btn-outline-dark btn-sm"
               onclick="return confirm('Delete?')">
                Delete
            </a>

        </td>

    </tr>

    </tbody>
</table>

</body>
</html>
