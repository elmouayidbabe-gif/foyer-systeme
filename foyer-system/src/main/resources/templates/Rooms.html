<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rooms Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/dashboard">
            Foyer System
        </a>

        <ul class="navbar-nav me-auto">

            <li class="nav-item">
                <a class="nav-link" href="/students">Students</a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" href="/rooms">Rooms</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/affectations">Affectations</a>
            </li>

        </ul>

    </div>
</nav>

<div class="container mt-4">

    <!-- TITLE -->
    <h2 class="fw-bold mb-3">Rooms Management</h2>

    <!-- FORM -->
    <div class="card shadow-sm mb-4">

        <div class="card-header bg-primary text-white">
            Add / Edit Room
        </div>

        <div class="card-body">

            <form th:action="@{/rooms/save}" th:object="${room}" method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="row">

                    <div class="col-md-4 mb-2">
                        <input class="form-control"
                               placeholder="Room Number"
                               th:field="*{roomNumber}" required>
                    </div>

                    <div class="col-md-4 mb-2">
                        <input class="form-control"
                               placeholder="Type"
                               th:field="*{type}">
                    </div>

                    <div class="col-md-4 mb-2">
                        <input type="number"
                               class="form-control"
                               placeholder="Capacity"
                               th:field="*{capacity}" min="1">
                    </div>

                </div>

                <button class="btn btn-success">
                    Save Room
                </button>

                <a href="/rooms" class="btn btn-secondary">
                    Reset
                </a>

            </form>

        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">
            Rooms List
        </div>

        <div class="card-body p-0">

            <table class="table table-hover mb-0">

                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Room Number</th>
                    <th>Type</th>
                    <th>Capacity</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="r : ${rooms}">

                    <td th:text="${r.id}"></td>
                    <td th:text="${r.roomNumber}"></td>
                    <td th:text="${r.type}"></td>
                    <td th:text="${r.capacity}"></td>

                    <td>

                        <!-- EDIT -->
                        <a th:href="@{/rooms/edit/{id}(id=${r.id})}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <!-- DELETE -->
                        <a th:href="@{/rooms/delete/{id}(id=${r.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this room?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
