<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Foyer System</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card text-white bg-primary shadow">
                <div class="card-body">
                    <h5>Students</h5>
                    <a href="/students" class="btn btn-light mt-3">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-success shadow">
                <div class="card-body">
                    <h5>Rooms</h5>
                    <a href="/rooms" class="btn btn-light mt-3">Open</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-warning shadow">
                <div class="card-body">
                    <h5>Affectations</h5>
                    <a href="/affectations" class="btn btn-light mt-3">Open</a>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
