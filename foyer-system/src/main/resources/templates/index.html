<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Foyer System - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1>🏠 Foyer Management System</h1>
        <p class="text-muted">Manage Students, Rooms and Affectations easily</p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center">
                    <h4>Students</h4>
                    <p class="text-muted">Manage all students</p>
                    <a href="/students" class="btn btn-primary w-100">
                        Go to Students
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center">
                    <h4>Rooms</h4>
                    <p class="text-muted">Manage rooms</p>
                    <a href="/rooms" class="btn btn-success w-100">
                        Go to Rooms
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body text-center">
                    <h4>Affectations</h4>
                    <p class="text-muted">Manage assignments</p>
                    <a href="/affectations" class="btn btn-warning w-100">
                        Go to Affectations
                    </a>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
