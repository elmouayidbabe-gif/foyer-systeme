<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Room Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/dashboard">Foyer System</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/students">Students</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/rooms">Rooms</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/affectations">Affectations</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Room Form</h2>

    <form th:action="@{/rooms/save}" th:object="${room}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Room Number</label>
            <input type="text" class="form-control" th:field="*{roomNumber}">
        </div>

        <div class="mb-3">
            <label>Type</label>
            <input type="text" class="form-control" th:field="*{type}">
        </div>

        <div class="mb-3">
            <label>Capacity</label>
            <input type="number" class="form-control" th:field="*{capacity}">
        </div>

        <button type="submit" class="btn btn-primary">Save</button>

        <a href="/rooms" class="btn btn-secondary">Back</a>

    </form>

</div>

</body>
</html>
