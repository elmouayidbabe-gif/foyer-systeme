<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/dashboard">Foyer System</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/students">Students</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/rooms">Rooms</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/affectations">Affectations</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">Student Form</h2>

    <form th:action="@{/students/save}" th:object="${student}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>First Name</label>
            <input type="text" class="form-control" th:field="*{firstName}">
        </div>

        <div class="mb-3">
            <label>Last Name</label>
            <input type="text" class="form-control" th:field="*{lastName}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" th:field="*{email}">
        </div>

        <div class="mb-3">
            <label>CIN</label>
            <input type="text" class="form-control" th:field="*{cin}">
        </div>

        <div class="mb-3">
            <label>Date of Birth</label>
            <input type="date" class="form-control" th:field="*{dateOfBirth}">
        </div>

        <button type="submit" class="btn btn-primary">Save</button>

        <a href="/students" class="btn btn-secondary">Back</a>

    </form>

</div>

</body>
</html>
