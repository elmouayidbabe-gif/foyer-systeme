<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/dashboard">
            Foyer System
        </a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="/students">Students</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/rooms">Rooms</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/affectations">Affectations</a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <!-- TITLE -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold">Students Management</h2>
    </div>

    <!-- FORM CARD -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            Add / Edit Student
        </div>

        <div class="card-body">

            <form th:action="@{/students/save}" th:object="${student}" method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="row">

                    <div class="col-md-4 mb-2">
                        <input class="form-control"
                               placeholder="First Name"
                               th:field="*{firstName}" required>
                    </div>

                    <div class="col-md-4 mb-2">
                        <input class="form-control"
                               placeholder="Last Name"
                               th:field="*{lastName}" required>
                    </div>

                    <div class="col-md-4 mb-2">
                        <input class="form-control"
                               placeholder="Email"
                               th:field="*{email}">
                    </div>

                    <div class="col-md-4 mb-2">
                        <input class="form-control"
                               placeholder="CIN"
                               th:field="*{cin}">
                    </div>

                    <div class="col-md-4 mb-2">
                        <input type="date"
                               class="form-control"
                               th:field="*{dateOfBirth}">
                    </div>

                </div>

                <button class="btn btn-success">
                    Save Student
                </button>

                <a href="/students" class="btn btn-secondary">
                    Reset
                </a>

            </form>

        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">
            Students List
        </div>

        <div class="card-body p-0">

            <table class="table table-hover mb-0">

                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>CIN</th>
                    <th>Date Of Birth</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="s : ${students}">

                    <td th:text="${s.id}"></td>
                    <td th:text="${s.firstName}"></td>
                    <td th:text="${s.lastName}"></td>
                    <td th:text="${s.email}"></td>
                    <td th:text="${s.cin}"></td>

                    <td th:text="${#temporals.format(s.dateOfBirth, 'yyyy-MM-dd')}"></td>

                    <td>

                        <!-- EDIT -->
                        <a th:href="@{/students/edit/{id}(id=${s.id})}"
                           class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <!-- DELETE -->
                        <a th:href="@{/students/delete/{id}(id=${s.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this student?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
